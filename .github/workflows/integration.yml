name: Integration

# Live integration tests against a real DuckHaven stack. The stack is stood up from the
# server's published ghcr images (no source build) using the server repo's own compose
# file, then seeded through the public API — the client packages stay decoupled.
#
# Uses no secrets: the first-boot setup token is read from the fresh API container, so this
# runs safely on fork PRs too. The stack comes up once and each member's suite runs only
# when that member (or a shared root) changed.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: DuckHaven ghcr image tag to test against
        default: latest
      server_ref:
        description: duckhaven server repo ref for the compose stack
        default: main

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      connector: ${{ steps.filter.outputs.connector }}
      dbt: ${{ steps.filter.outputs.dbt }}
      dlt: ${{ steps.filter.outputs.dlt }}
      any: ${{ steps.filter.outputs.connector == 'true' || steps.filter.outputs.dbt == 'true' || steps.filter.outputs.dlt == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            shared: &shared
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - '.python-version'
              - 'ci/integration/**'
              - '.github/workflows/integration.yml'
            connector:
              - *shared
              - 'packages/duckhaven-sql-connector/**'
            dbt:
              - *shared
              - 'packages/dbt-duckhaven/**'
            dlt:
              - *shared
              - 'packages/dlt-duckhaven/**'

  integration:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    env:
      # Override to a tag whose image includes the SQL session surface.
      DUCKHAVEN_IMAGE_TAG: ${{ github.event.inputs.image_tag || vars.DUCKHAVEN_IMAGE_TAG || 'latest' }}
      COMPOSE_PROJECT_NAME: duckhaven
      CF: -f server/deploy/docker-compose.yml -f ci/integration/compose.sessions.yml
      DH_HOST: http://localhost:8000
      DH_WORKSPACE: analytics
      DH_CATALOG: analytics
    steps:
      - uses: actions/checkout@v7

      - name: Check out the DuckHaven server deploy stack
        uses: actions/checkout@v7
        with:
          repository: tamasmrtn/duckhaven
          ref: ${{ github.event.inputs.server_ref || 'main' }}
          path: server
          sparse-checkout: deploy

      - uses: astral-sh/setup-uv@v7
      - run: uv sync

      - name: Start the DuckHaven stack (ghcr images)
        run: docker compose $CF up -d --quiet-pull

      - name: Wait for the API and agent to be healthy
        run: |
          for _ in $(seq 1 60); do
            ok=1
            for svc in api agent; do
              cid=$(docker compose $CF ps -q "$svc")
              status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo missing)
              [ "$status" = "healthy" ] || ok=0
            done
            [ "$ok" = "1" ] && { echo "stack healthy"; exit 0; }
            sleep 5
          done
          echo "stack did not become healthy" >&2
          docker compose $CF logs api agent | tail -120 >&2
          exit 1

      - name: Capture the first-boot setup token
        run: echo "DH_SETUP_TOKEN=$(docker compose $CF exec -T api cat /var/duckhaven/setup_token)" >> "$GITHUB_ENV"

      - name: Seed a workspace, catalog, and service-account PAT
        run: python3 ci/integration/seed.py

      - name: Run connector integration tests
        if: needs.changes.outputs.connector == 'true'
        run: make test-integration

      - name: Run dbt-duckhaven conformance + e2e
        if: needs.changes.outputs.dbt == 'true'
        run: make test-dbt-integration

      # The dlt destination stages Parquet by HTTP PUT to a presigned URL the API signs
      # for the compose-network MinIO host (`S3_ENDPOINT=minio:9000`, so the in-network
      # agent can read it back). The test client runs on the host, which can't resolve
      # `minio`, so map it to the published MinIO port. The SigV4 `Host: minio:9000` stays
      # intact, so the signature still matches.
      - name: Route the MinIO staging host to the published port (dlt e2e)
        if: needs.changes.outputs.dlt == 'true'
        run: echo "127.0.0.1 minio" | sudo tee -a /etc/hosts

      - name: Run dlt-duckhaven e2e
        if: needs.changes.outputs.dlt == 'true'
        run: make test-dlt-integration

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose $CF logs --no-color > compose-logs.txt

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: integration-compose-logs
          path: compose-logs.txt

      - name: Tear down
        if: always()
        run: docker compose $CF down -v

  # Single required check for this workflow: green when integration passed or was
  # intentionally skipped (no client package changed).
  integration-success:
    if: always()
    needs: [changes, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Verify integration passed or was skipped
        run: |
          result="${{ needs.integration.result }}"
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "Integration did not pass: $result"
            exit 1
          fi
          echo "Integration passed or was skipped."
