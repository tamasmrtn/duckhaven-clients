name: Release

# Each member publishes independently via a tag prefix, e.g. sql-connector-v1.2.3.
# This workflow routes that tag to the matching package, dry-runs on TestPyPI, then
# publishes to PyPI via Trusted Publishing (OIDC) — no stored API token.
on:
  push:
    tags:
      - "sql-connector-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.route.outputs.package }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs derives the version from this tag
      - id: route
        run: echo "package=duckhaven-sql-connector" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@v5
      - run: uv build --package ${{ steps.route.outputs.package }}
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
