name: Release

# Each member publishes independently via a tag prefix, e.g. sql-connector-v1.2.3.
# This workflow routes that tag to the matching package, dry-runs on TestPyPI, then
# publishes to PyPI via Trusted Publishing (OIDC) — no stored API token.
on:
  push:
    tags:
      - "sql-connector-v*"
      - "dbt-duckhaven-v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.route.outputs.package }}
      # Each package publishes from its own GitHub environment so its PyPI Trusted
      # Publisher is a distinct (workflow, environment) pair. PyPI requires a *pending*
      # publisher's (repo, workflow, environment) to be unique across projects, so
      # sharing one environment across members collides while both are pending.
      env_testpypi: ${{ steps.route.outputs.env_testpypi }}
      env_pypi: ${{ steps.route.outputs.env_pypi }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs derives the version from this tag
      - id: route
        run: |
          case "${GITHUB_REF_NAME}" in
            sql-connector-v*)
              echo "package=duckhaven-sql-connector" >> "$GITHUB_OUTPUT"
              echo "env_testpypi=testpypi" >> "$GITHUB_OUTPUT"
              echo "env_pypi=pypi" >> "$GITHUB_OUTPUT" ;;
            dbt-duckhaven-v*)
              echo "package=dbt-duckhaven" >> "$GITHUB_OUTPUT"
              echo "env_testpypi=testpypi-dbt-duckhaven" >> "$GITHUB_OUTPUT"
              echo "env_pypi=pypi-dbt-duckhaven" >> "$GITHUB_OUTPUT" ;;
            *) echo "unrecognized release tag prefix: ${GITHUB_REF_NAME}" >&2; exit 1 ;;
          esac
      - uses: astral-sh/setup-uv@v7
      - run: uv build --package ${{ steps.route.outputs.package }}
      - run: uvx twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.env_testpypi }}
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    needs: [build, testpypi]
    runs-on: ubuntu-latest
    environment: ${{ needs.build.outputs.env_pypi }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
